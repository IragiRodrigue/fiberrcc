# Base FiberRCNN configuration
# Inherits from Detectron2 defaults and adds fiber-specific settings.
# Override per-backbone in child configs.

_BASE_: ""

MODEL:
  META_ARCHITECTURE: "GeneralizedRCNN"
  BACKBONE:
    NAME: "build_resnet_fpn_backbone"
    FREEZE_AT: 2
  RESNETS:
    OUT_FEATURES: ["res2", "res3", "res4", "res5"]
    DEPTH: 50
  FPN:
    IN_FEATURES: ["res2", "res3", "res4", "res5"]
    OUT_CHANNELS: 256
    NORM: ""
    FUSE_TYPE: "sum"
  ANCHOR_GENERATOR:
    SIZES: [[32], [64], [128], [256], [512]]
    ASPECT_RATIOS: [[0.5, 1.0, 2.0]]
  RPN:
    IN_FEATURES: ["p2", "p3", "p4", "p5", "p6"]
    PRE_NMS_TOPK_TRAIN: 2000
    PRE_NMS_TOPK_TEST: 1000
    POST_NMS_TOPK_TRAIN: 1000
    POST_NMS_TOPK_TEST: 1000
    NMS_THRESH: 0.7
    BATCH_SIZE_PER_IMAGE: 256
    POSITIVE_FRACTION: 0.5
    LOSS_WEIGHT: 1.0
    BOUNDARY_THRESH: -1
  ROI_HEADS:
    NAME: "FiberROIHeads"
    IN_FEATURES: ["p2", "p3", "p4", "p5"]
    NUM_CLASSES: 1
    BATCH_SIZE_PER_IMAGE: 512
    POSITIVE_FRACTION: 0.25
    SCORE_THRESH_TEST: 0.5
    NMS_THRESH_TEST: 0.5
    IOU_THRESHOLDS: [0.5]
    IOU_LABELS: [0, 1]
  ROI_BOX_HEAD:
    NAME: "FastRCNNConvFCHead"
    NUM_FC: 2
    FC_DIM: 1024
    POOLER_RESOLUTION: 7
    POOLER_SAMPLING_RATIO: 0
    POOLER_TYPE: "ROIAlignV2"
    NORM: ""
    CLS_AGNOSTIC_BBOX_REG: False
  ROI_MASK_HEAD:
    NAME: "MaskRCNNConvUpsampleHead"
    POOLER_RESOLUTION: 14
    POOLER_SAMPLING_RATIO: 0
    POOLER_TYPE: "ROIAlignV2"
    NUM_CONV: 4
    CONV_DIM: 256
    NORM: ""
  # Fiber-specific pooler resolution
  FIBER_ROI_POOLER_RESOLUTION: 14
  MASK_ON: True
  KEYPOINT_ON: True
  DEVICE: "cuda"
  WEIGHTS: ""
  PIXEL_MEAN: [103.530, 116.280, 123.675]
  PIXEL_STD: [1.0, 1.0, 1.0]

INPUT:
  FORMAT: "BGR"
  MIN_SIZE_TRAIN: [640, 672, 704, 736, 768, 800]
  MAX_SIZE_TRAIN: 1333
  MIN_SIZE_TEST: 800
  MAX_SIZE_TEST: 1333
  MIN_SIZE_TRAIN_SAMPLING: "choice"
  RANDOM_FLIP: "horizontal"
  MASK_FORMAT: "bitmask"

DATASETS:
  TRAIN: ("fiber_train",)
  TEST: ("fiber_val",)

DATALOADER:
  NUM_WORKERS: 4
  FILTER_EMPTY_ANNOTATIONS: True
  REPEAT_THRESHOLD: 0.0

SOLVER:
  BASE_LR: 0.0025
  BIAS_LR_FACTOR: 1.0
  MOMENTUM: 0.9
  WEIGHT_DECAY: 0.0001
  WEIGHT_DECAY_NORM: 0.0
  GAMMA: 0.1
  STEPS: (60000, 80000)
  MAX_ITER: 90000
  WARMUP_FACTOR: 0.001
  WARMUP_ITERS: 1000
  WARMUP_METHOD: "linear"
  CHECKPOINT_PERIOD: 5000
  IMS_PER_BATCH: 4
  CLIP_GRADIENTS:
    ENABLED: True
    CLIP_TYPE: "full_model"
    CLIP_VALUE: 1.0
    NORM_TYPE: 2.0
  AMP:
    ENABLED: True

TEST:
  EVAL_PERIOD: 5000
  AUG:
    ENABLED: False

OUTPUT_DIR: "./output/fiberrcnn_base"

VERSION: 2
