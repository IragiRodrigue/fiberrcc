_BASE_: "fiber_rcnn_r50_fpn.yaml"

MODEL:
  ANCHOR_GENERATOR:
    SIZES: [[16], [32], [64], [128], [256]]
    ASPECT_RATIOS: [[0.2, 0.5, 1.0, 2.0, 5.0]]
  RPN:
    PRE_NMS_TOPK_TRAIN: 4000
    PRE_NMS_TOPK_TEST: 2000
    POST_NMS_TOPK_TRAIN: 2000
    POST_NMS_TOPK_TEST: 1000
  ROI_HEADS:
    BATCH_SIZE_PER_IMAGE: 256

INPUT:
  MIN_SIZE_TRAIN: [896, 960]
  MAX_SIZE_TRAIN: 1600
  MIN_SIZE_TEST: 960
  MAX_SIZE_TEST: 1600

SOLVER:
  IMS_PER_BATCH: 1

OUTPUT_DIR: "./output/fiberrcnn_r50_fpn_rpn_tune_c"
