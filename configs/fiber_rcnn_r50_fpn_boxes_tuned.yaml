_BASE_: "fiber_rcnn_r50_fpn_boxes_only.yaml"

MODEL:
  BACKBONE:
    FREEZE_AT: 1
  ANCHOR_GENERATOR:
    SIZES: [[16], [32], [64], [128], [256]]
    ASPECT_RATIOS: [[0.2, 0.5, 1.0, 2.0, 5.0]]
  RPN:
    PRE_NMS_TOPK_TRAIN: 4000
    PRE_NMS_TOPK_TEST: 2000
    POST_NMS_TOPK_TRAIN: 2000
    POST_NMS_TOPK_TEST: 1000
    NMS_THRESH: 0.85
  ROI_HEADS:
    SCORE_THRESH_TEST: 0.2
    NMS_THRESH_TEST: 0.4

INPUT:
  MIN_SIZE_TRAIN: [896, 960, 1024]
  MAX_SIZE_TRAIN: 1600
  MIN_SIZE_TEST: 960
  MAX_SIZE_TEST: 1600

SOLVER:
  BASE_LR: 0.00025
  MAX_ITER: 4000
  STEPS: (2800, 3600)
  WARMUP_ITERS: 300

TEST:
  EVAL_PERIOD: 250

OUTPUT_DIR: "./output/fiberrcnn_r50_fpn_boxes_tuned"
